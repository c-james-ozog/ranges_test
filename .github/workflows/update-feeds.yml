name: Update commodity feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "15 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright==1.52.0
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape-feeds.py

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-feed-full.json weekly-feed-full.json previous-ranges-feed-full.json errors.json
          git diff --cached --quiet || git commit -m "Update commodity feeds"
          git push
